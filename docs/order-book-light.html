<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受注簿 - Light</title>
    <link rel="stylesheet" href="mockup/order-book-light.css">
</head>
<body>

    <!-- ヘッダー -->
    <header class="ob-header">
        <div class="ob-header-left">
            <h1>受注簿</h1>
            <span class="ob-today-label" id="todayLabel"></span><!-- 【検証用】本番環境では不要または別方式 -->
        </div>
        <div class="ob-header-center">
            <div class="ob-month-nav">
                <button class="ob-month-btn" onclick="changeMonth(-1)">◀ 前月</button>
                <span class="ob-month-label" id="monthLabel">2026年3月</span>
                <button class="ob-month-btn" onclick="changeMonth(1)">次月 ▶</button>
            </div>
        </div>
        <div class="ob-header-right">
            <a href="order-book-dark.html" class="theme-toggle-btn">
                <span class="theme-toggle-label">Dark Mode</span>
            </a>
        </div>
    </header>

    <!-- ツールバー -->
    <div class="ob-toolbar">
        <div class="ob-toolbar-left">
            <button class="ob-tb-btn" id="undoBtn" onclick="undo()" disabled>↩ 戻る</button>
            <button class="ob-tb-btn" id="redoBtn" onclick="redo()" disabled>↪ 次へ</button>
            <span class="ob-toolbar-sep"></span>
            <button class="ob-tb-btn" onclick="openSortModal()">⇅ ソート</button>
            <button class="ob-tb-btn" onclick="toggleFilterRow()">🔍 フィルタ</button>
            <button class="ob-tb-btn" onclick="toggleHiddenRows()">👁 表示/非表示</button>
            <button class="ob-tb-btn" onclick="toggleWeekendColors()">🎨 土日祝色</button>
            <span class="ob-toolbar-sep"></span>
            <button class="ob-tb-btn ob-tb-btn-add" onclick="addNewRow()">＋ 行追加</button>
        </div>
        <div class="ob-toolbar-right">
            <span class="ob-summary" id="summaryText">全 12 件</span>
        </div>
    </div>

    <!-- フィルタ行（トグル表示） -->
    <!-- 【モックアップ専用】フィルタの選択肢は本番ではDBから動的に生成 -->
    <div class="ob-filter-bar" id="filterBar" style="display:none;">
        <label>会社:
            <select id="filterBranch" onchange="applyFilters()">
                <option value="">すべて</option>
                <option>東央警備</option>
                <option>Nikkeiホールディングス</option>
            </select>
        </label>
        <label>区分:
            <select id="filterCategory" onchange="applyFilters()">
                <option value="">すべて</option>
                <option>施設</option>
                <option>イベント</option>
                <option>高速</option>
                <option>交通</option>
                <option>応援交通</option>
            </select>
        </label>
        <label>昼/夜:
            <select id="filterShift" onchange="applyFilters()">
                <option value="">すべて</option>
                <option>昼</option>
                <option>夜</option>
            </select>
        </label>
        <label>契約先:
            <input type="text" id="filterCompany" placeholder="契約先名で絞込" oninput="applyFilters()">
        </label>
        <button class="ob-filter-clear" onclick="clearFilters()">✕ クリア</button>
    </div>

    <!-- グリッドコンテナ -->
    <div class="ob-grid-wrapper">
        <div class="ob-grid-scroll" id="gridScroll">
            <div class="ob-grid" id="obGrid"></div>
        </div>
    </div>

    <!-- ツールチップ -->
    <div class="ob-tooltip" id="cellTooltip" style="display:none;"></div>

    <!-- カスタム時間ピッカー -->
    <div class="ob-time-dropdown" id="timePickerDropdown" style="display:none;">
        <div class="ob-time-col-wrap">
            <div class="ob-time-col-header">時</div>
            <div class="ob-time-col" id="timePickerHours"></div>
        </div>
        <div class="ob-time-col-wrap">
            <div class="ob-time-col-header">分</div>
            <div class="ob-time-col" id="timePickerMinutes"></div>
        </div>
    </div>

    <!-- セル編集モーダル -->
    <div class="ob-modal-overlay" id="editModalOverlay" style="display:none;" onclick="closeEditModal(event)">
        <div class="ob-modal" onclick="event.stopPropagation()">
            <div class="ob-modal-header">
                <h3 id="editModalTitle">セル編集</h3>
                <button class="ob-modal-close" onclick="closeEditModal()">✕</button>
            </div>
            <div class="ob-modal-body">
                <div class="ob-modal-info" id="editModalInfo"></div>
                <div class="ob-edit-form">
                    <div class="ob-count-confidence-row">
                        <div class="ob-form-row">
                            <label>人数</label>
                            <input type="number" id="editCount" min="0" max="99">
                        </div>
                        <div class="ob-confidence-field">
                            <label>信頼度</label>
                            <div class="ob-confidence-chips" id="confidenceChips"></div>
                        </div>
                    </div>
                    <div class="ob-sub-task-fields" id="subTaskFields">
                        <div class="ob-sub-task-header">
                            <span class="ob-sub-task-title">業務詳細</span>
                            <button type="button" class="ob-btn-add-sub" onclick="addSubTaskEntry()">+ 追加</button>
                        </div>
                        <div id="subTaskList">
                            <!-- JSで動的に描画 -->
                        </div>
                    </div>
                    <div class="ob-plan-name-row">
                        <div class="ob-plan-name-label">業務管理計画書 業務名</div>
                        <div class="ob-plan-name-value" id="editDailyTaskName">-</div>
                    </div>
                    <div class="ob-badge-section">
                        <div class="ob-badge-group">
                            <div class="ob-badge-group-header">
                                <span class="ob-badge-group-title">区分</span>
                                <span class="ob-badge-parent-display" id="badgeParentDisplay">-</span>
                            </div>
                        </div>
                        <div class="ob-badge-group ob-badge-child-group" id="badgeChildSection" style="display:none;">
                            <div class="ob-badge-group-header">
                                <span class="ob-badge-group-subtitle">作業内容</span>
                            </div>
                            <div class="ob-badge-chips" id="badgeChildList">
                                <!-- JSで動的に描画 -->
                            </div>
                            <div class="ob-badge-undo-bar" id="badgeUndoBar" style="display:none;">
                                <span id="badgeUndoMsg"></span>
                                <button type="button" class="ob-badge-undo-btn" onclick="undoDeleteBadge()">戻す</button>
                            </div>
                            <button type="button" class="ob-btn-add-badge" onclick="addChildBadge()">+ 作業内容追加</button>
                        </div>
                    </div>
                    <div class="ob-form-row ob-form-row-half">
                        <div>
                            <label>開始時間</label>
                            <div class="ob-time-picker-wrap" onclick="openTimePicker('editStartTime', this)">
                                <input type="text" id="editStartTime" class="ob-time-input" readonly placeholder="--:--">
                                <span class="ob-time-picker-icon">🕐</span>
                            </div>
                        </div>
                        <div>
                            <label>終了時間</label>
                            <div class="ob-time-picker-wrap" onclick="openTimePicker('editEndTime', this)">
                                <input type="text" id="editEndTime" class="ob-time-input" readonly placeholder="--:--">
                                <span class="ob-time-picker-icon">🕐</span>
                            </div>
                        </div>
                    </div>
                    <div class="ob-form-row ob-form-row-half">
                        <div>
                            <label>現場監督</label>
                            <input type="text" id="editSupervisor" placeholder="氏名">
                        </div>
                        <div>
                            <label>連絡先</label>
                            <input type="tel" id="editSupervisorTel" placeholder="電話番号">
                        </div>
                    </div>
                    <div class="ob-supervisor-candidates" id="supervisorCandidates" style="display:none;">
                        <span class="ob-candidates-label">過去の入力:</span>
                        <div class="ob-candidates-chips" id="supervisorCandidateChips"></div>
                        <div class="ob-sv-undo-bar" id="svUndoBar" style="display:none;">
                            <span id="svUndoMsg"></span>
                            <button type="button" class="ob-badge-undo-btn" onclick="undoDeleteSupervisor()">戻す</button>
                        </div>
                    </div>
                    <div class="ob-form-row ob-form-row-half">
                        <div>
                            <label>集合場所</label>
                            <input type="text" id="editMeetingPlace" placeholder="集合場所を入力">
                        </div>
                        <div>
                            <label>集合時間</label>
                            <div class="ob-time-picker-wrap" onclick="openTimePicker('editMeetingTime', this)">
                                <input type="text" id="editMeetingTime" class="ob-time-input" readonly placeholder="--:--">
                                <span class="ob-time-picker-icon">🕐</span>
                            </div>
                        </div>
                    </div>
                    <div class="ob-map-section">
                        <label>現場地図</label>
                        <div class="ob-map-url-row">
                            <input type="url" id="editMapUrl" placeholder="Google Maps等のURLを入力">
                            <button type="button" class="ob-btn-map-preview" onclick="previewMap()">プレビュー</button>
                        </div>
                        <div class="ob-map-preview" id="mapPreviewContainer" style="display:none;">
                            <iframe id="mapPreviewFrame" sandbox="allow-scripts allow-same-origin" loading="lazy"></iframe>
                            <button type="button" class="ob-btn-map-clear" onclick="clearMapPreview()" title="プレビューを閉じる">✕</button>
                        </div>
                    </div>
                    <div class="ob-form-row">
                        <label>備考</label>
                        <textarea id="editRemarks" rows="2"></textarea>
                    </div>
                </div>
            </div>
            <div class="ob-modal-footer">
                <button class="ob-btn ob-btn-danger" onclick="deleteCell()">削除</button>
                <div class="ob-modal-footer-right">
                    <button class="ob-btn ob-btn-secondary" onclick="closeEditModal()">キャンセル</button>
                    <button class="ob-btn ob-btn-primary" onclick="saveEdit()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 行情報編集モーダル -->
    <div class="ob-modal-overlay" id="rowEditModalOverlay" style="display:none;" onclick="closeRowEditModal(event)">
        <div class="ob-modal ob-modal-sm" onclick="event.stopPropagation()">
            <div class="ob-modal-header">
                <span id="rowEditModalTitle">行情報編集</span>
            </div>
            <div class="ob-modal-body">
                <div class="ob-chip-field">
                    <div class="ob-chip-field-header">
                        <span class="ob-chip-field-title">会社</span>
                    </div>
                    <div class="ob-row-chips" id="rowEditBranchChips"></div>
                </div>
                <div class="ob-chip-field">
                    <div class="ob-chip-field-header">
                        <span class="ob-chip-field-title">区分</span>
                        <button type="button" class="ob-btn-add-chip" onclick="addRowCategory()">+ 追加</button>
                    </div>
                    <div class="ob-row-chips" id="rowEditCategoryChips"></div>
                </div>
                <div class="ob-chip-field">
                    <div class="ob-chip-field-header">
                        <span class="ob-chip-field-title">昼夜</span>
                    </div>
                    <div class="ob-row-chips" id="rowEditShiftChips"></div>
                </div>
                <div class="ob-form-row">
                    <label>契約先名</label>
                    <input type="text" id="rowEditCompany">
                </div>
                <div class="ob-form-row">
                    <label>業務名</label>
                    <input type="text" id="rowEditTask" placeholder="空欄で個別業務">
                </div>
            </div>
            <div class="ob-modal-footer">
                <div></div>
                <div class="ob-modal-footer-right">
                    <button class="ob-btn ob-btn-secondary" onclick="closeRowEditModal()">キャンセル</button>
                    <button class="ob-btn ob-btn-primary" onclick="saveRowEdit()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ソート設定モーダル -->
    <div class="ob-modal-overlay" id="sortModalOverlay" style="display:none;" onclick="closeSortModal(event)">
        <div class="ob-modal ob-modal-sm" onclick="event.stopPropagation()">
            <div class="ob-modal-header">
                <h3>ソート設定</h3>
                <button class="ob-modal-close" onclick="closeSortModal()">✕</button>
            </div>
            <div class="ob-modal-body">
                <p class="ob-sort-desc">ドラッグで優先順位を変更できます</p>
                <ul class="ob-sort-list" id="sortList">
                    <li draggable="true" data-key="branch"><span class="ob-sort-grip">☰</span> 会社 <button class="ob-sort-dir" onclick="toggleSortDir(this)">▲</button></li>
                    <li draggable="true" data-key="category"><span class="ob-sort-grip">☰</span> 区分カテゴリ <button class="ob-sort-dir" onclick="toggleSortDir(this)">▲</button></li>
                    <li draggable="true" data-key="company"><span class="ob-sort-grip">☰</span> 契約先名 <button class="ob-sort-dir" onclick="toggleSortDir(this)">▲</button></li>
                    <li draggable="true" data-key="task"><span class="ob-sort-grip">☰</span> 業務名 <button class="ob-sort-dir" onclick="toggleSortDir(this)">▲</button></li>
                    <li draggable="true" data-key="shift"><span class="ob-sort-grip">☰</span> 昼/夜 <button class="ob-sort-dir" onclick="toggleSortDir(this)">▲</button></li>
                </ul>
            </div>
            <div class="ob-modal-footer">
                <button class="ob-btn ob-btn-secondary" onclick="closeSortModal()">キャンセル</button>
                <button class="ob-btn ob-btn-primary" onclick="applySort()">適用</button>
            </div>
        </div>
    </div>

    <script src="mockup/order-book-light.js"></script>
</body>
</html>
